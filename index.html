                summary: "欧盟发布自动驾驶和远程驾驶法律框架，为成员国的自动驾驶法规提供指导",
                detail: "欧盟委员会发布统一法规框架，协调成员国自动驾驶法规差异。",
                tags: ["标准", "立法"]
            },
            {
                country: "欧洲",
                title: "欧洲自动驾驶法规与政策汇总",
                url: "https://www.connectedautomateddriving.eu/regulation-and-policies/",
                source: "CAD",
                date: "2025-11-15",
                summary: "欧洲自动驾驶法规和政策汇总，涵盖UNECE法规和各国政策",
                detail: "汇总欧盟及成员国在UNECE框架下的自动驾驶法规协调进展。",
                tags: ["标准", "政策"]
            },
            {
                country: "欧洲",
                title: "德国自动驾驶法规更新",
                url: "https://www.bmvi.de/EN/Topics/Mobility/AutomatedDriving/",
                source: "BMVI",
                date: "2025-06-01",
                summary: "德国更新自动驾驶法规，允许在特定条件下使用自动驾驶功能",
                detail: "德国是欧洲自动驾驶法规最完善的国家之一，允许L3级在特定场景下使用。",
                tags: ["标准", "试点"]
            }
        ];

        // Initialize
        let currentFilter = 'all';
        let currentTag = null;
        let searchQuery = '';

        // Render timeline
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            const sorted = [...policies].sort((a, b) => new Date(b.date) - new Date(a.date));
            const uniqueDates = [...new Set(sorted.map(p => p.date))].slice(0, 6);
            
            timeline.innerHTML = uniqueDates.map(date => {
                const policy = sorted.find(p => p.date === date);
                const countryFlag = policy.country === '中国' ? '🇨🇳' : policy.country === '美国' ? '🇺🇸' : '🇪🇺';
                return `
                    <div class="timeline-item">
                        <div class="timeline-date">${date}</div>
                        <div class="timeline-dot"></div>
                        <div class="timeline-label">${countryFlag} ${policy.title.slice(0, 15)}...</div>
                    </div>
                `;
            }).join('');
        }

        function renderPolicies() {
            const list = document.getElementById('update-list');
            const filtered = policies.filter(p => {
                const matchCountry = currentFilter === 'all' || p.country === currentFilter;
                const matchTag = !currentTag || p.tags.some(t => t.includes(currentTag));
                const matchSearch = !searchQuery || 
                    p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.summary.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCountry && matchTag && matchSearch;
            });

            // Update counts
            document.getElementById('total-count').textContent = policies.length;
            document.getElementById('cn-count').textContent = policies.filter(p => p.country === '中国').length;
            document.getElementById('us-count').textContent = policies.filter(p => p.country === '美国').length;
            document.getElementById('eu-count').textContent = policies.filter(p => p.country === '欧洲').length;

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🚗💨</div>
                        <div class="empty-state-title">数据采集中</div>
                        <div class="empty-state-text">自动驾驶政策正在来的路上，敬请期待～</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map((p, idx) => {
                const countryClass = p.country === '中国' ? 'country-cn' : p.country === '美国' ? 'country-us' : 'country-eu';
                const tagHtml = p.tags.map(t => {
                    let tagClass = 'tag-l3';
                    if (t.includes('L4')) tagClass = 'tag-l4';
                    else if (t.includes('责任')) tagClass = 'tag-liability';
                    else if (t.includes('数据')) tagClass = 'tag-data';
                    else if (t.includes('标准')) tagClass = 'tag-standard';
                    else if (t.includes('试点')) tagClass = 'tag-pilot';
                    return `<span class="card-tag ${tagClass}">#${t}</span>`;
                }).join('');

                return `
                    <div class="update-card" onclick="toggleDetail('card-${idx}')">
                        <div class="card-header">
                            <div class="card-header-left">
                                <span class="country-tag ${countryClass}">${p.country}</span>
                                <div class="card-tags">${tagHtml}</div>
                            </div>
                        </div>
                        <div class="card-title">${p.title}</div>
                        <div class="card-summary">${p.summary}</div>
                        <div class="card-detail" id="card-${idx}">
                            <div class="card-detail-title">📋 政策详情</div>
                            <div class="card-detail-content">${p.detail}</div>
                        </div>
                        <div class="card-meta">
                            <span>📰 <a href="${p.url}" target="_blank">${p.source}</a></span>
                            <span>📅 ${p.date}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleDetail(id) {
            const el = document.getElementById(id);
            el.classList.toggle('show');
        }

        // Event listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPolicies();
            });
        });

        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const tagValue = tag.dataset.tag;
                if (currentTag === tagValue) {
                    currentTag = null;
                    tag.classList.remove('active');
                } else {
                    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentTag = tagValue;
                }
                renderPolicies();
            });
        });

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPolicies();
        });

        // Initial render
        renderTimeline();
        renderPolicies();
    </script>
</body>
</html>
