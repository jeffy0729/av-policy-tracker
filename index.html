<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自动驾驶政策法规最新动态</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0d1b2a 100%);
            min-height: 100vh;
            padding: 24px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        header { 
            background: linear-gradient(135deg, rgba(0,212,255,0.15) 0%, rgba(0,100,200,0.1) 100%);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        header h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        header h1 span { color: #00d4ff; }
        header .subtitle { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; }
        
        .stats { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat { 
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 16px;
            padding: 16px 24px;
            text-align: center;
            min-width: 100px;
            backdrop-filter: blur(5px);
        }
        .stat-number { 
            font-family: 'Orbitron', sans-serif;
            font-size: 32px; 
            font-weight: bold; 
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
        }
        .stat-label { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; }
        
        /* Search & Filter */
        .controls { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { 
            width: 100%;
            padding: 14px 20px 14px 50px; 
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 12px; 
            font-size: 15px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            backdrop-filter: blur(5px);
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        .search-box input:focus { outline: none; border-color: #00d4ff; box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        .search-box::before { 
            content: '⚡'; 
            position: absolute; 
            left: 16px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 18px; 
        }
        
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { 
            padding: 12px 24px; 
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 25px; 
            background: rgba(0,0,0,0.3);
            color: #fff;
            cursor: pointer; 
            font-size: 14px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        .filter-btn:hover { 
            transform: translateY(-2px);
            border-color: #00d4ff;
        }
        .filter-btn.active { 
            background: linear-gradient(135deg, #00d4ff, #0064c8);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }
        
        .tag-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
        .tag-label { color: rgba(255,255,255,0.5); font-size: 13px; }
        .tag { 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .tag:hover { transform: scale(1.05); }
        .tag.active { font-weight: bold; border-color: #fff; }
        .tag-l3 { background: rgba(46,125,50,0.4); color: #a5d6a7; }
        .tag-l3.active { background: #2e7d32; color: #fff; }
        .tag-l4 { background: rgba(21,101,192,0.4); color: #90caf9; }
        .tag-l4.active { background: #1565c0; color: #fff; }
        .tag-liability { background: rgba(230,81,0,0.4); color: #ffcc80; }
        .tag-liability.active { background: #e65100; color: #fff; }
        .tag-data { background: rgba(123,31,162,0.4); color: #ce93d8; }
        .tag-data.active { background: #7b1fa2; color: #fff; }
        .tag-standard { background: rgba(0,105,92,0.4); color: #80cbc4; }
        .tag-standard.active { background: #00695c; color: #fff; }
        .tag-pilot { background: rgba(194,24,91,0.4); color: #f48fb1; }
        .tag-pilot.active { background: #c2185b; color: #fff; }
        
        /* Policy Cards Grid */
        .update-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px; 
        }
        .update-card { 
            background: linear-gradient(145deg, rgba(30,30,60,0.8), rgba(20,20,40,0.9));
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 16px; 
            padding: 20px; 
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .update-card:hover { 
            transform: translateY(-4px);
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 8px 32px rgba(0,212,255,0.15);
        }
        
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .country-tag { 
            padding: 5px 14px; 
            border-radius: 20px; 
            font-size: 12px; 
            color: #fff; 
            font-weight: 500;
        }
        .country-cn { background: linear-gradient(135deg, #e53935, #c62828); }
        .country-us { background: linear-gradient(135deg, #1976d2, #0d47a1); }
        .country-eu { background: linear-gradient(135deg, #7b1fa2, #4a148c); }
        
        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .card-tag { padding: 3px 10px; border-radius: 12px; font-size: 11px; }
        
        .card-title { 
            font-size: 16px; 
            margin: 10px 0; 
            line-height: 1.5;
            font-weight: 500;
        }
        .card-title a { 
            color: #fff; 
            text-decoration: none;
            transition: color 0.2s;
        }
        .card-title a:hover { color: #00d4ff; }
        
        .card-summary { 
            color: rgba(255,255,255,0.7); 
            font-size: 13px; 
            margin: 12px 0; 
            line-height: 1.6;
        }
        
        .card-meta { 
            display: flex; 
            gap: 16px; 
            color: rgba(255,255,255,0.5); 
            font-size: 12px; 
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Empty State */
        .empty-state { 
            text-align: center; 
            padding: 80px 20px;
            grid-column: 1 / -1;
        }
        .empty-state-icon { 
            font-size: 80px; 
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .empty-state-title {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .empty-state-text {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .update-list { grid-template-columns: 1fr; }
            header h1 { font-size: 24px; }
            .stats { justify-content: center; }
            .controls { flex-direction: column; }
            .filter-group { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 <span>自动驾驶</span> 政策法规最新动态</h1>
            <div class="subtitle">最近12个月 · 中国🇨🇳 美国🇺🇸 欧洲🇪🇺</div>
            <div class="stats">
                <div class="stat"><div class="stat-number" id="total-count">0</div><div class="stat-label">总计</div></div>
                <div class="stat"><div class="stat-number" id="cn-count">0</div><div class="stat-label">中国</div></div>
                <div class="stat"><div class="stat-number" id="us-count">0</div><div class="stat-label">美国</div></div>
                <div class="stat"><div class="stat-number" id="eu-count">0</div><div class="stat-label">欧洲</div></div>
            </div>
        </header>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索政策标题或关键词...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">🌐 全部</button>
                <button class="filter-btn" data-filter="中国">🇨🇳 中国</button>
                <button class="filter-btn" data-filter="美国">🇺🇸 美国</button>
                <button class="filter-btn" data-filter="欧洲">🇪🇺 欧洲</button>
            </div>
        </div>
        
        <div class="tag-filters">
            <span class="tag-label">按议题:</span>
            <span class="tag tag-l3" data-tag="L3">#L3准入</span>
            <span class="tag tag-l4" data-tag="L4">#L4</span>
            <span class="tag tag-liability" data-tag="责任">#事故责任</span>
            <span class="tag tag-data" data-tag="数据">#数据安全</span>
            <span class="tag tag-standard" data-tag="标准">#标准</span>
            <span class="tag tag-pilot" data-tag="试点">#试点</span>
        </div>
        
        <div class="update-list" id="update-list">
            <!-- Policy cards will be inserted here -->
        </div>
    </div>

    <script>
        // Policy data with real dates and summaries
        const policies = [
            // ========== 中国政策 ==========
            {
                country: "中国",
                title: "工信部批准首批L3级自动驾驶车型准入许可",
                url: "https://www.news.cn/tech/20260105/2126b790de364faa9f5e66cc927cb979/c.html",
                source: "新华网",
                date: "2025-12-15",
                summary: "工信部公布首批L3级有条件自动驾驶车型准入许可，长安深蓝SL03、极狐阿尔法S6将在重庆、北京指定区域开展上路试点",
                tags: ["L3", "准入", "试点"]
            },
            {
                country: "中国",
                title: "长安汽车获得国内首块L3专用号牌",
                url: "https://www.news.cn/tech/20260105/2126b790de364faa9f5e66cc927cb979/c.html",
                source: "新华网",
                date: "2025-12-20",
                summary: "长安深蓝SL03获得L3专用号牌\"渝AD0001Z\"，极狐汽车获得\"京AA0001Z\"，开启合规商用试点",
                tags: ["L3", "号牌", "试点"]
            },
            {
                country: "中国",
                title: "北京上海开放L3级自动驾驶试点路段",
                url: "https://www.stcn.com/article/detail/3605550.html",
                source: "证券时报",
                date: "2025-12-01",
                summary: "北京、上海相继开放部分路段供L3级自动驾驶车辆开展上路通行试点",
                tags: ["L3", "试点"]
            },
            {
                country: "中国",
                title: "何小鹏两会建言：推动自动驾驶从L2直接到L4",
                url: "https://finance.sina.com.cn/wm/2026-03-04/doc-inhpvaym0164073.shtml",
                source: "新浪财经",
                date: "2026-03-04",
                summary: "建议在保持L2级安全监管稳定运行基础上，推动自动驾驶政策从L2向L4跨越，明确L4车辆注册通行管理体系",
                tags: ["L3", "L4", "政策"]
            },
            {
                country: "中国",
                title: "雷军建议完善多方协同治理体系",
                url: "https://xinwen.bjd.com.cn/content/s69accfe5e4b0687a289238f4.html",
                source: "新京报",
                date: "2026-03-08",
                summary: "建议将L2级辅助驾驶\"脱手脱眼\"纳入交通违法处罚，明确L3/L4级智驾安全准则，强化车企宣传责任",
                tags: ["L3", "L4", "责任"]
            },
            {
                country: "中国",
                title: "江苏省出台L4级无人驾驶装备商业示范应用指引",
                url: "https://www.stcn.com/article/detail/3605550.html",
                source: "证券时报",
                date: "2025-11-01",
                summary: "为L4级及以上、低速新型运载装备（如无人物流车、无人环卫车）的商业化运营提供规范",
                tags: ["L4", "试点", "标准"]
            },
            {
                country: "中国",
                title: "工信部《2025年汽车标准化工作要点》",
                url: "https://www.miit.gov.cn/",
                source: "工信部",
                date: "2025-04-01",
                summary: "推动自动驾驶设计运行条件、自动泊车等标准发布，加快自动驾驶系统安全要求强制性国家标准研制",
                tags: ["标准", "安全", "L3"]
            },
            {
                country: "中国",
                title: "2025城市NOA汽车辅助驾驶研究报告",
                url: "https://www.stcn.com/article/detail/3605550.html",
                source: "证券时报",
                date: "2026-01-22",
                summary: "L2级辅助驾驶渗透率达64%，城市NOA功能累计销量321.9万辆，占乘用车15.1%",
                tags: ["标准", "数据"]
            },
            
            // ========== 美国政策 ==========
            {
                country: "美国",
                title: "NHTSA发布自动驾驶安全框架声明",
                url: "https://saferoads.org/2025-nhtsa-av-framework-statement/",
                source: "SafeRoads",
                date: "2025-08-15",
                summary: "NHTSA发布新自动驾驶框架声明，更新安全标准和监管指南",
                tags: ["标准", "安全"]
            },
            {
                country: "美国",
                title: "美国国会推进SELF DRIVE Act法案",
                url: "https://www.foxnews.com/politics/congress-moves-set-national-rules-self-driving-cars-overriding-states",
                source: "Fox News",
                date: "2026-02-10",
                summary: "众议院委员会通过SELF DRIVE Act，设立联邦安全标准，优先于州法规",
                tags: ["标准", "立法"]
            },
            {
                country: "美国",
                title: "USDOT发布自动驾驶汽车活动汇总",
                url: "https://www.transportation.gov/AV",
                source: "USDOT",
                date: "2025-09-01",
                summary: "交通部发布自动驾驶汽车活动汇总，涵盖联邦层面的政策和研究",
                tags: ["标准", "政策"]
            },
            {
                country: "美国",
                title: "NCSL公布各州自动驾驶立法情况",
                url: "https://www.ncsl.org/transportation/autonomous-vehicles",
                source: "NCSL",
                date: "2025-07-20",
                summary: "汇总美国各州已颁布的自动驾驶相关法规",
                tags: ["立法", "标准"]
            },
            {
                country: "美国",
                title: "加州监管机构确认特斯拉未运营自动驾驶服务",
                url: "https://electrek.co/2026/03/25/california-regulator-confirms-tesla-not-operating-autonomous-vehicle-service/",
                source: "Electrek",
                date: "2026-03-25",
                summary: "加州监管机构确认特斯拉未运营自动驾驶服务，需符合相关法规",
                tags: ["责任", "监管"]
            },
            
            // ========== 欧洲政策 ==========
            {
                country: "欧洲",
                title: "欧盟自动驾驶法规框架",
                url: "https://www.taylorwessing.com/en/insights-and-events/insights/2026/02/legal-frameworks-for-autonomous-driving-and-teledriving",
                source: "Taylor Wessing",
                date: "2026-02-01",
                summary: "欧盟发布自动驾驶和远程驾驶法律框架，为成员国的自动驾驶法规提供指导",
                tags: ["标准", "立法"]
            },
            {
                country: "欧洲",
                title: "欧洲自动驾驶法规与政策汇总",
                url: "https://www.connectedautomateddriving.eu/regulation-and-policies/",
                source: "CAD",
                date: "2025-11-15",
                summary: "欧洲自动驾驶法规和政策汇总，涵盖UNECE法规和各国政策",
                tags: ["标准", "政策"]
            },
            {
                country: "欧洲",
                title: "德国自动驾驶法规更新",
                url: "https://www.bmvi.de/EN/Topics/Mobility/AutomatedDriving/",
                source: "BMVI",
                date: "2025-06-01",
                summary: "德国更新自动驾驶法规，允许在特定条件下使用自动驾驶功能",
                tags: ["标准", "试点"]
            }
        ];

        // Initialize
        let currentFilter = 'all';
        let currentTag = null;
        let searchQuery = '';

        function renderPolicies() {
            const list = document.getElementById('update-list');
            const filtered = policies.filter(p => {
                const matchCountry = currentFilter === 'all' || p.country === currentFilter;
                const matchTag = !currentTag || p.tags.some(t => t.includes(currentTag));
                const matchSearch = !searchQuery || 
                    p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.summary.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCountry && matchTag && matchSearch;
            });

            // Update counts
            document.getElementById('total-count').textContent = policies.length;
            document.getElementById('cn-count').textContent = policies.filter(p => p.country === '中国').length;
            document.getElementById('us-count').textContent = policies.filter(p => p.country === '美国').length;
            document.getElementById('eu-count').textContent = policies.filter(p => p.country === '欧洲').length;

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🚗💨</div>
                        <div class="empty-state-title">数据采集中</div>
                        <div class="empty-state-text">自动驾驶政策正在来的路上，敬请期待～</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(p => {
                const countryClass = p.country === '中国' ? 'country-cn' : p.country === '美国' ? 'country-us' : 'country-eu';
                const tagHtml = p.tags.map(t => {
                    let tagClass = 'tag-l3';
                    if (t.includes('L4')) tagClass = 'tag-l4';
                    else if (t.includes('责任')) tagClass = 'tag-liability';
                    else if (t.includes('数据')) tagClass = 'tag-data';
                    else if (t.includes('标准')) tagClass = 'tag-standard';
                    else if (t.includes('试点')) tagClass = 'tag-pilot';
                    return `<span class="card-tag ${tagClass}">#${t}</span>`;
                }).join('');

                return `
                    <div class="update-card">
                        <div class="card-header">
                            <span class="country-tag ${countryClass}">${p.country}</span>
                            <div class="card-tags">${tagHtml}</div>
                        </div>
                        <div class="card-title">
                            <a href="${p.url}" target="_blank">${p.title}</a>
                        </div>
                        <div class="card-summary">${p.summary}</div>
                        <div class="card-meta">
                            <span>📰 ${p.source}</span>
                            <span>📅 ${p.date}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Event listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPolicies();
            });
        });

        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const tagValue = tag.dataset.tag;
                if (currentTag === tagValue) {
                    currentTag = null;
                    tag.classList.remove('active');
                } else {
                    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentTag = tagValue;
                }
                renderPolicies();
            });
        });

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPolicies();
        });

        // Initial render
        renderPolicies();
    </script>
</body>
</html>
